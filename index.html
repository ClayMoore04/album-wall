<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Booth</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0a0a0a; }

      /* Default: hide mobile tab bar and sidebar */
      .mobile-tab-bar { display: none; }
      .sidebar-nav { display: none !important; }
      .app-content { margin-left: 0; }

      /* Mobile: show tab bar, hide desktop nav */
      @media (max-width: 600px) {
        .mobile-tab-bar { display: flex !important; }
        .desktop-nav-links { display: none !important; }
      }

      /* Desktop wide: show sidebar, hide top nav and tab bar */
      @media (min-width: 901px) {
        .sidebar-nav { display: flex !important; }
        .desktop-nav-links { display: none !important; }
        .app-content { margin-left: 64px; transition: margin-left 0.2s ease; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
